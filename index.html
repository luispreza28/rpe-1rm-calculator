<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Strength Calculator - 1RM & RPE</title>

<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
h2 { margin-bottom:10px; }
.container { max-width:900px; margin:auto; }
.card { background:#1e293b; padding:20px; margin:20px 0; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.4); }
.section-title { font-size:14px; opacity:0.7; margin-bottom:5px; }
.row { display:flex; flex-wrap:wrap; gap:10px; }
input, select { flex:1; padding:10px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white; }
button { width:100%; padding:12px; border-radius:12px; border:none; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:bold; cursor:pointer; }
.result-box { background:#0f172a; padding:12px; border-radius:10px; margin-top:10px; font-size:18px; font-weight:bold; text-align:center; }
.rep-buttons { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.rep-buttons button { width:40px; padding:6px; font-size:14px; background:#1e293b; border:1px solid #334155; }
.rep-buttons button.active { background:#3b82f6; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; text-align:left; border-bottom:1px solid #334155; }
th { opacity:0.7; font-size:13px; }
</style>
</head>
<body>

<div class="container">
<h1>Strength Calculator - 1RM & RPE</h1>
<div class="card">
<h2>1RM Calculator</h2>

<div style="margin-bottom:15px;">
  <label>Units:</label>
  <select id="unitToggle">
    <option value="lb">Pounds (lb)</option>
    <option value="kg">Kilograms (kg)</option>
  </select>
</div>
  
<div class="section-title">Reps Method</div>
<div class="row">
<input type="number" id="weight" placeholder="Weight">
<input type="number" id="reps" placeholder="Reps">
</div>

<div class="section-title" style="margin-top:15px;">RPE Method</div>
<div class="row">
<input type="number" id="rpeWeight" placeholder="Weight">
<input type="number" id="rpeReps" placeholder="Reps">
<select id="rpeValue">
<option value="10">RPE 10</option>
<option value="9.5">9.5</option>
<option value="9">9</option>
<option value="8.5">8.5</option>
<option value="8">8</option>
<option value="7.5">7.5</option>
<option value="7">7</option>
<option value="6.5">6.5</option>
<option value="6">6</option>
</select>
</div>

<button onclick="calculate()">Calculate</button>
<div id="oneRMDisplay" class="result-box"></div>
</div>

<div class="card" id="output"></div>
</div>

<script>
let currentUnit = "lb";

function convertToLbs(value) {
    return currentUnit === "kg" ? value * 2.20462 : value;
}

function convertFromLbs(value) {
    return currentUnit === "kg" ? value / 2.20462 : value;
}

function roundWeight(value) {
    return currentUnit === "kg"
        ? Math.round(value / 2.5) * 2.5
        : Math.round(value / 5) * 5;
}

function convertInputValue(val, fromUnit, toUnit) {
    if (!val || isNaN(val)) return val;
    if (fromUnit === toUnit) return val;
    return fromUnit === "lb"
        ? val / 2.20462
        : val * 2.20462;
}

if ('serviceWorker' in navigator) {
  if (location.protocol === 'https:' || location.hostname === 'localhost') {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.log('SW registration failed:', err);
    });
  }
}

let global1RM = null;

function getBasePercent(reps) {
 const base={1:1,2:.96,3:.92,4:.89,5:.86,6:.83,7:.8,8:.77,9:.74,10:.71,11:.68,12:.65};
 if(base[reps]) return base[reps];
 let p=base[12]; for(let i=13;i<=reps;i++) p-=.03; return Math.max(p,.3);
}

function calculate(){
 let wInput = +weight.value, r = +reps.value;
 let w = convertToLbs(wInput);
 let e = w*(1+r/30);

 let rwInput = +rpeWeight.value, rr = +rpeReps.value, rv = +rpeValue.value;
 let rw = convertToLbs(rwInput);
 let rpe=null;

 if(rw && rr){ 
   let b=getBasePercent(rr); 
   let a=b-((10-rv)*2*0.015); 
   rpe=rw/a; 
 }

 let one=rpe||e;
 if(!one || isNaN(one)) return;

 global1RM=one;
 let display1RM = roundWeight(convertFromLbs(one));
 oneRMDisplay.innerText=`Estimated 1RM: ${display1RM.toFixed(1)} ${currentUnit}`;
 renderChart();
}

function renderChart(){
 let html=`<h2>RPE Chart</h2>`;
 html+=`<div class="rep-buttons" id="repBtns"></div>`;
 html+=`<div id="selectedLabel" style="opacity:.7">Reps: 5</div>`;
 html+=`<table><tr><th>RPE</th><th>%</th><th>Load</th></tr><tbody id="rpeBody"></tbody></table>`;

 html+=`<div class="card"><h2>Target Weight</h2>
 <div class="row">
 <input id="targetReps" placeholder="Reps">
 <select id="targetRPE"><option value="9">RPE 9</option><option value="8">8</option><option value="7">7</option></select>
 </div>
 <button onclick="calcTarget()">Calculate</button>
 <div id="targetOut" class="result-box"></div></div>`;

 html+=`<div class="card"><h2>Back-Off Sets</h2>
 <div class="row">
 <input id="boSets" placeholder="Sets">
 <input id="boReps" placeholder="Reps">
 <select id="boRPE"><option value="8">RPE 8</option><option value="7">7</option><option value="6">6</option></select>
 </div>
 <div class="row">
 <label style="flex:1;">Drop % per set:</label>
 <select id="boDrop">
   <option value="2.5">2.5%</option>
   <option value="5">5%</option>
 </select>
 </div>
 <button onclick="calcBackoff()">Generate</button>
 <div id="boOut" class="result-box"></div></div>`;

 output.innerHTML=html;

 let selected=5;

 function drawBtns(){
   repBtns.innerHTML="";
   for(let i=1;i<=20;i++){
     let b=document.createElement("button");
     b.innerText=i;
     if(i===selected) b.classList.add("active");
     b.onclick=()=>{selected=i;drawBtns();drawTable();};
     repBtns.appendChild(b);
   }
 }

 function drawTable(){
   selectedLabel.innerText=`Reps: ${selected}`;
   rpeBody.innerHTML="";
   [10,9.5,9,8.5,8,7.5,7,6.5,6].forEach(r=>{
     let base=getBasePercent(selected);
     let p=base-((10-r)*2*0.015);
     let load=global1RM*p;
     let displayLoad = roundWeight(convertFromLbs(load));
     rpeBody.innerHTML+=`<tr><td>${r}</td><td>${(p*100).toFixed(1)}%</td><td>${displayLoad} ${currentUnit}</td></tr>`;
   });
 }

 drawBtns(); drawTable();
}

function calcTarget(){
 let reps=+targetReps.value;
 let rpe=+targetRPE.value;
 let base=getBasePercent(reps);
 let p=base-((10-rpe)*2*0.015);
 let weight = global1RM*p;
 let displayWeight = roundWeight(convertFromLbs(weight));
 targetOut.innerText=`Target: ${displayWeight} ${currentUnit}`;
}

function calcBackoff(){
 let sets=+boSets.value, reps=+boReps.value, rpe=+boRPE.value;
 let dropPercent = +boDrop.value / 100;

 let base=getBasePercent(reps);
 let p=base-((10-rpe)*2*0.015);
 let baseWeight=global1RM*p;

 let html="";

 for(let i=1;i<=sets;i++){
   let adjustedWeight = baseWeight * (1 - dropPercent*(i-1));
   let displayWeight = roundWeight(convertFromLbs(adjustedWeight));
   html+=`Set ${i}: ${displayWeight} ${currentUnit}<br>`;
 }

 boOut.innerHTML=html;
}

let prevUnit = "lb";

document.getElementById("unitToggle").addEventListener("change", function () {
    const newUnit = this.value;

    weight.value = convertInputValue(+weight.value, prevUnit, newUnit) || "";
    rpeWeight.value = convertInputValue(+rpeWeight.value, prevUnit, newUnit) || "";

    prevUnit = newUnit;
    currentUnit = newUnit;

    if (global1RM) calculate();
});
</script>

</body>
</html>
